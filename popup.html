<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL 參數編輯器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header-section">
      <h1>URL 參數編輯器</h1>
    </div>

    <div class="url-section">
      <div class="url-label">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M3.9 12C3.9 10.29 5.29 8.9 7 8.9H11V7H7C4.24 7 2 9.24 2 12C2 14.76 4.24 17 7 17H11V15.1H7C5.29 15.1 3.9 13.71 3.9 12ZM8 13H16V11H8V13ZM17 7H13V8.9H17C18.71 8.9 20.1 10.29 20.1 12C20.1 13.71 18.71 15.1 17 15.1H13V17H17C19.76 17 22 14.76 22 12C22 9.24 19.76 7 17 7Z" fill="currentColor"/>
        </svg>
        目前網址
      </div>
      <div id="currentUrl" class="current-url"></div>
    </div>

    <div class="params-section">
      <div class="section-header">
        <h2>
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.89 22 5.99 22H18C19.1 22 20 21.1 20 20V8L14 2ZM18 20H6V4H13V9H18V20Z" fill="currentColor"/>
          </svg>
          查詢參數
        </h2>
        <button id="addParam" class="btn btn-add">
          <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M19 13H13V19H11V13H5V11H11V5H13V11H19V13Z" fill="currentColor"/>
          </svg>
          新增參數
        </button>
      </div>

      <div id="paramsList" class="params-list"></div>
    </div>

    <div class="actions">
      <button id="clearAll" class="btn btn-secondary">
        <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z" fill="currentColor"/>
        </svg>
        清空全部
      </button>
      <button id="refreshBtn" class="btn btn-primary">
        <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4C7.58 4 4.01 7.58 4.01 12C4.01 16.42 7.58 20 12 20C15.73 20 18.84 17.45 19.73 14H17.65C16.83 16.33 14.61 18 12 18C8.69 18 6 15.31 6 12C6 8.69 8.69 6 12 6C13.66 6 15.14 6.69 16.22 7.78L13 11H20V4L17.65 6.35Z" fill="currentColor"/>
        </svg>
        套用並重新整理
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
