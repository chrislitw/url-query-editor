<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Query Editor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>URL Query 编辑器</h1>

    <div class="url-section">
      <label>当前 URL:</label>
      <div id="currentUrl" class="current-url"></div>
    </div>

    <div class="params-section">
      <div class="header">
        <h2>Query 参数</h2>
        <button id="addParam" class="btn btn-add">+ 添加参数</button>
      </div>

      <div id="paramsList" class="params-list"></div>
    </div>

    <div class="actions">
      <button id="refreshBtn" class="btn btn-primary">刷新页面</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
